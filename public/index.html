<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おサイフ帳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ['Outfit','Hiragino Sans','Yu Gothic','sans-serif'],
            bebas:  ['Bebas Neue','sans-serif'],
          },
          colors: {
            ink:     '#0d0d0d',
            paper:   '#f5f0e4',
            cream:   '#fffdf7',
            sub:     '#5c5c5c',
            rule:    '#d4cec2',
            income:  '#108a56',
            'income-soft': '#e4f5ec',
            expense: '#d63b2f',
            'expense-soft': '#fcecea',
            bal:     '#1a56db',
            'bal-soft': '#e8effe',
            yellow:  '#ffd60a',
            'yellow-dark': '#e6be00',
          },
          boxShadow: {
            hard:   '4px 4px 0px #0d0d0d',
            'hard-sm': '2px 2px 0px #0d0d0d',
            'hard-lg': '6px 6px 0px #0d0d0d',
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>

<body class="font-outfit bg-paper text-ink min-h-screen">

<!-- ── Header ─────────────────────────── -->
<header class="bg-ink text-cream relative overflow-hidden">
  <!-- Yellow stripe top -->
  <div class="h-1.5 bg-yellow w-full"></div>

  <div class="px-5 pt-6 pb-10 text-center relative z-10">
    <!-- Stamp-style label -->
    <div class="inline-block border-2 border-yellow text-yellow text-[0.6rem] font-bold tracking-[0.35em] uppercase px-3 py-1 mb-3">
      Student Finance
    </div>

    <h1 class="text-3xl font-black tracking-tight leading-none">🎓 おサイフ帳</h1>
    <p class="text-cream/40 text-xs mt-1.5 tracking-wide">毎日の収支を記録しよう</p>

    <div id="mascot" class="text-5xl mt-5 mb-4 inline-block">😊</div>

    <!-- Month nav pill -->
    <div class="flex justify-center">
      <div class="inline-flex items-center gap-3 border border-cream/20 rounded-full px-5 py-2">
        <button id="prevMonth" class="text-cream text-xl w-7 h-7 flex items-center justify-center rounded-full hover:bg-cream/10 transition">‹</button>
        <span id="currentMonth" class="min-w-[110px] text-center text-sm font-bold text-cream tracking-wide"></span>
        <button id="nextMonth" class="text-cream text-xl w-7 h-7 flex items-center justify-center rounded-full hover:bg-cream/10 transition">›</button>
      </div>
    </div>
  </div>

  <!-- Diagonal cut bottom -->
  <div class="absolute bottom-0 left-0 right-0 h-6 bg-paper" style="clip-path: polygon(0 100%, 100% 0%, 100% 100%)"></div>
</header>

<!-- ── Main ───────────────────────────── -->
<main class="mx-auto max-w-lg px-4 pt-4 pb-24">

  <!-- Summary cards -->
  <section class="grid grid-cols-3 gap-3 mb-5">
    <!-- Income -->
    <div class="income-card bg-cream border-2 border-ink rounded-xl p-4 text-center shadow-hard hover:-translate-y-0.5 hover:shadow-hard-lg transition-all min-w-0">
      <div class="text-xl mb-1">💚</div>
      <div class="text-[0.58rem] font-bold uppercase tracking-widest text-sub mb-1">収入</div>
      <div id="totalIncome" class="card-amount font-bebas text-income leading-none">¥0</div>
    </div>
    <!-- Expense -->
    <div class="expense-card bg-cream border-2 border-ink rounded-xl p-4 text-center shadow-hard hover:-translate-y-0.5 hover:shadow-hard-lg transition-all min-w-0">
      <div class="text-xl mb-1">💸</div>
      <div class="text-[0.58rem] font-bold uppercase tracking-widest text-sub mb-1">支出</div>
      <div id="totalExpense" class="card-amount font-bebas text-expense leading-none">¥0</div>
    </div>
    <!-- Balance -->
    <div class="balance-card bg-cream border-2 border-ink rounded-xl p-4 text-center shadow-hard hover:-translate-y-0.5 hover:shadow-hard-lg transition-all min-w-0">
      <div class="text-xl mb-1">💰</div>
      <div class="text-[0.58rem] font-bold uppercase tracking-widest text-sub mb-1">残高</div>
      <div id="totalBalance" class="card-amount font-bebas text-bal leading-none">¥0</div>
    </div>
  </section>

  <!-- Chart -->
  <section class="bg-cream border-2 border-ink rounded-xl p-5 shadow-hard mb-5">
    <div class="flex items-center gap-2 mb-4">
      <div class="w-1.5 h-5 bg-yellow rounded-full"></div>
      <span class="text-[0.68rem] font-bold uppercase tracking-widest text-sub">6ヶ月の収支グラフ</span>
    </div>
    <div class="relative h-44"><canvas id="budgetChart"></canvas></div>
  </section>

  <!-- Spending bar -->
  <section class="bg-cream border-2 border-ink rounded-xl px-5 py-4 shadow-hard mb-5">
    <div class="flex justify-between items-center mb-3">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-4 bg-ink rounded-full"></div>
        <span class="text-xs font-bold text-sub uppercase tracking-widest">支出割合</span>
      </div>
      <span id="spendingPercent" class="font-bebas text-xl text-ink tracking-wide">0%</span>
    </div>
    <div class="h-3 bg-rule rounded-full overflow-hidden border border-ink/10">
      <div id="spendingBar" class="bar-fill" style="width:0%"></div>
    </div>
    <div id="spendingMessage" class="mt-2.5 text-center text-xs text-sub/80"></div>
  </section>

  <!-- Tabs -->
  <div class="flex gap-2 mb-5">
    <button class="tab active flex-1 py-2.5 border-2 border-ink rounded-lg text-xs font-bold uppercase tracking-wider transition-all" data-tab="register">＋ 記録</button>
    <button class="tab flex-1 py-2.5 border-2 border-ink rounded-lg text-xs font-bold uppercase tracking-wider transition-all" data-tab="history">履歴</button>
    <button class="tab flex-1 py-2.5 border-2 border-ink rounded-lg text-xs font-bold uppercase tracking-wider transition-all" data-tab="badges">実績</button>
  </div>

  <!-- ── Register ── -->
  <div class="tab-content active" id="tab-register">
    <!-- Type toggle -->
    <div class="flex gap-2.5 mb-4">
      <button class="type-btn flex-1 py-3.5 border-2 border-ink rounded-xl text-sm font-bold transition-all" data-type="income">💚 収入</button>
      <button class="type-btn active flex-1 py-3.5 border-2 border-ink rounded-xl text-sm font-bold transition-all" data-type="expense">💸 支出</button>
    </div>

    <div class="bg-cream border-2 border-ink rounded-xl p-5 shadow-hard space-y-5">
      <!-- Category -->
      <div>
        <label class="field-label">カテゴリ</label>
        <div id="categoryGrid" class="category-grid"></div>
      </div>

      <!-- Amount -->
      <div>
        <label class="field-label">金額</label>
        <div class="flex border-2 border-ink rounded-lg overflow-hidden bg-paper focus-within:ring-2 focus-within:ring-yellow focus-within:ring-offset-1 transition-all">
          <span class="px-4 py-3.5 font-black text-xl text-sub bg-rule/40 border-r-2 border-ink">¥</span>
          <input type="number" id="amount" placeholder="0" min="1" max="9999999"
            class="flex-1 bg-transparent px-4 py-3.5 font-bebas text-3xl text-ink outline-none placeholder-ink/20 tracking-wide">
        </div>
      </div>

      <!-- Memo -->
      <div>
        <label class="field-label">メモ（任意）</label>
        <input type="text" id="description" placeholder="例：友達とランチ"
          class="w-full border-2 border-ink rounded-lg px-4 py-3 bg-paper text-sm text-ink outline-none placeholder-ink/30 focus:ring-2 focus:ring-yellow focus:ring-offset-1 transition-all">
      </div>

      <!-- Date -->
      <div>
        <label class="field-label">日付</label>
        <input type="date" id="date"
          class="w-full border-2 border-ink rounded-lg px-4 py-3 bg-paper text-sm text-ink outline-none focus:ring-2 focus:ring-yellow focus:ring-offset-1 transition-all">
      </div>

      <button id="submitBtn" class="submit-btn expense-mode">支出を登録！</button>
    </div>
  </div>

  <!-- ── History ── -->
  <div class="tab-content" id="tab-history">
    <div id="transactionList">
      <div class="empty-state">
        <div class="empty-emoji">📭</div>
        <p>まだ記録がないよ！<br>最初の記録をしてみよう！</p>
      </div>
    </div>
  </div>

  <!-- ── Badges ── -->
  <div class="tab-content" id="tab-badges">
    <div id="badgeList"></div>
  </div>

</main>

<!-- Toast -->
<div id="toast" class="toast fixed bottom-7 left-1/2 z-50 whitespace-nowrap rounded-full border-2 border-ink px-7 py-3 text-sm font-bold shadow-hard"></div>

<canvas id="confettiCanvas" class="pointer-events-none fixed inset-0 z-[999] hidden"></canvas>
<script src="app.js"></script>
</body>
</html>
